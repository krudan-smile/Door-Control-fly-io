<!DOCTYPE html>
<html>
<head>
  <title>Door Control LIFF</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <h2>🚪 Door Control System</h2>
  <p>กำลังโหลดข้อมูลผู้ใช้...</p>
  <script>
    async function main() {
      await liff.init({ liffId: "2007541705-YWRjgDNG" });

      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }

      const profile = await liff.getProfile();

      await fetch("/api/send-message", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          userId: profile.userId,
          displayName: profile.displayName
        })
      });

      document.body.innerHTML = `<h2>✅ สวัสดีคุณ ${profile.displayName}, ระบบแจ้งข้อมูลเข้าห้องแชทแล้ว!</h2>`;
    }

    main();
  </script>
</body>
</html>
